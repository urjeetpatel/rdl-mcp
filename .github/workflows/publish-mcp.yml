name: Publish to MCP Registry

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Validate server.json schema
        run: |
          # Install jsonschema for validation
          pip install jsonschema requests

          # Download and validate against the schema
          python3 << 'VALIDATION_SCRIPT'
          import json
          import requests
          from jsonschema import validate, ValidationError

          # Load server.json
          with open('server.json', 'r') as f:
              server_config = json.load(f)

          # Download schema
          schema_url = server_config.get('$schema', 'https://static.modelcontextprotocol.io/schemas/2025-10-17/server.schema.json')
          response = requests.get(schema_url)
          response.raise_for_status()
          schema = response.json()

          # Validate
          try:
              validate(instance=server_config, schema=schema)
              print("✓ server.json is valid!")
          except ValidationError as e:
              print(f"✗ Validation error: {e.message}")
              exit(1)
          VALIDATION_SCRIPT

      - name: Install MCP Publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/download/v1.0.0/mcp-publisher_1.0.0_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz
          sudo mv mcp-publisher /usr/local/bin/
          chmod +x /usr/local/bin/mcp-publisher

      - name: Publish to MCP Registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Authenticate with GitHub
          echo "$GITHUB_TOKEN" | mcp-publisher login github --token-stdin

          # Publish to registry
          mcp-publisher publish
